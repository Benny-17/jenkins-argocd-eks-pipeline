---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    name: dev

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: dev
  labels:
    app: gitops-app
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: gitops-app
        image: 122385534147.dkr.ecr.ap-south-1.amazonaws.com/gitops-app:dev-24
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        
        # Environment variables
        env:
        - name: ENVIRONMENT
          value: "dev"
        - name: APP_VERSION
          value: "1.0.0"
        - name: PYTHONUNBUFFERED
          value: "1"
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Resource limits
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        
        # Security
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          capabilities:
            drop:
            - ALL
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache
      
      # Pod-level security
      securityContext:
        fsGroup: 1000
      
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      
      # Restart policy
      restartPolicy: Always
      
      # Termination grace period
      terminationGracePeriodSeconds: 30

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: gitops-app
  namespace: dev
  labels:
    app: gitops-app
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: gitops-app
  sessionAffinity: None
  externalTrafficPolicy: Local

---
